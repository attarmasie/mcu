MedicineBatch:
  type: object
  required:
    - id
    - medicine_id
    - batch_number
    - expiration_date
    - stock
    - unit
    - minimum_stock
    - status
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
      example: "223e4567-e89b-12d3-a456-426614174111"
      description: Medicine batch UUID
    medicine_id:
      type: string
      format: uuid
      example: "123e4567-e89b-12d3-a456-426614174000"
      description: Related medicine UUID
    batch_number:
      type: string
      example: "BATCH-A-2024"
      description: Production batch number
    expiration_date:
      type: string
      format: date
      example: "2026-02-01"
      description: Expiration date
    stock:
      type: integer
      minimum: 0
      example: 50
      description: Available stock for this batch
    unit:
      type: string
      example: "tablet"
      description: Stock unit
    minimum_stock:
      type: integer
      minimum: 0
      example: 10
      description: Minimum stock threshold
    status:
      type: string
      enum: [active, expired, depleted]
      example: "active"
      description: Batch status
    created_at:
      type: string
      format: date-time
      description: Creation timestamp
    updated_at:
      type: string
      format: date-time
      description: Last update timestamp

CreateMedicineBatchRequest:
  type: object
  required:
    - medicine_id
    - batch_number
    - expiration_date
    - stock
    - unit
