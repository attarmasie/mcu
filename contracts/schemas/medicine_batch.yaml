    expiration_date:
      type: string
      format: date
      example: "2026-02-01"
    stock:
      type: integer
      minimum: 0
      example: 50
    unit:
      type: string
      example: "tablet"
    minimum_stock:
      type: integer
      minimum: 0
      example: 10

