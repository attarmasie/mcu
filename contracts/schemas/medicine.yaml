Medicine:
  type: object
  required:
    - id
    - code
    - name
    - current_stock
    - minimum_stock
    - strength
    - dosage_form
    - is_prescription_required
    - status
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
      example: "123e4567-e89b-12d3-a456-426614174000"
      description: Medicine UUID
    code:
      type: string
      example: "PARA-500-TAB"
      description: Internal medicine code
    name:
      type: string
      minLength: 2
      maxLength: 255
      example: "Paracetamol"
      description: Medicine name
    current_stock:
      type: integer
      minimum: 0
      example: 120
      description: Current total stock from all active batches
    minimum_stock:
      type: integer
      minimum: 0
      example: 10
      description: Minimum stock threshold for reorder alert
    strength:
      type: string
      example: "500 mg"
      description: Medicine strength
    dosage_form:
      type: string
      enum: [tablet, capsule, syrup, injection, cream]
      example: "tablet"
      description: Dosage form
    is_prescription_required:
      type: boolean
      example: false
      description: Whether prescription is required
    status:
      type: string
      enum: [active, inactive]
      example: "active"
      description: Medicine status
    notes:
      type: string
      nullable: true
      example: "Pain reliever and fever reducer"
      description: Additional notes
    created_at:
      type: string
      format: date-time
      description: Creation timestamp
    updated_at:
      type: string
      format: date-time
      description: Last update timestamp

CreateMedicineRequest:
  type: object
  required:
    - code
    - name
    - strength
    - dosage_form
    - is_prescription_required
    - minimum_stock
  properties:
