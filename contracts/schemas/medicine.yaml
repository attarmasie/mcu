      type: string
      minLength: 2
      maxLength: 255
      example: "Paracetamol"
    strength:
      type: string
      example: "500 mg"
    dosage_form:
      type: string
      enum: [tablet, capsule, syrup, injection, cream]
      example: "tablet"
    is_prescription_required:
      type: boolean
      example: false
    minimum_stock:
      type: integer
      minimum: 0
      example: 10
      description: Minimum stock threshold for reorder alert
    notes:
      type: string
      nullable: true
      example: "Pain reliever and fever reducer"

