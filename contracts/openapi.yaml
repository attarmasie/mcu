# contracts/openapi.yaml
openapi: 3.0.3
info:
  title: Backend API
  description: RESTful API with authentication
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://localhost:8080/api/v1
    description: Development server
  - url: https://api.example.com/v1
    description: Production server

tags:
  - name: auth
    description: Authentication endpoints
  - name: users
    description: User management
  - name: patients
    description: Patient management
  - name: patient_checkups
    description: Patient checkup history management
  - name: medicines
    description: Medicine master data management
  - name: medicine_batches
    description: Medicine batch and inventory management

paths:
  /auth/register:
    $ref: "./paths/auth.yaml#/auth_register"

  /auth/login:
    $ref: "./paths/auth.yaml#/auth_login"

  /auth/me:
    $ref: "./paths/auth.yaml#/auth_me"

  /users:
    $ref: "./paths/users.yaml#/users"

  /users/{id}:
    $ref: "./paths/users.yaml#/users_by_id"

  /patients:
    $ref: "./paths/patient.yaml#/patients"

  /patients/{id}:
    $ref: "./paths/patient.yaml#/patients_by_id"

  /patient-checkups:
    $ref: "./paths/patient_checkups.yaml#/patient_checkups"

  /patient-checkups/{id}:
    $ref: "./paths/patient_checkups.yaml#/patient_checkups_by_id"

  /medicines:
    $ref: "./paths/medicine.yaml#/medicines"

  /medicines/{id}:
    $ref: "./paths/medicine.yaml#/medicines_by_id"

  /medicines/{id}/stock-activities:
    $ref: "./paths/medicine.yaml#/medicine_stock_activities"

  /medicine-batches:
    $ref: "./paths/medicine_batches.yaml#/medicine_batches"

  /medicine-batches/{id}:
    $ref: "./paths/medicine_batches.yaml#/medicine_batches_by_id"

components:
  parameters:
    # Common parameters
    PageParam:
      $ref: "./parameters/common.yaml#/PageParam"
    PerPageParam:
      $ref: "./parameters/common.yaml#/PerPageParam"
    IdParam:
      $ref: "./parameters/common.yaml#/IdParam"
    SearchParam:
      $ref: "./parameters/common.yaml#/SearchParam"

    # Patient parameters
    PatientGenderParam:
      $ref: "./parameters/patient.yaml#/PatientGenderParam"
    PatientTypeParam:
      $ref: "./parameters/patient.yaml#/PatientTypeParam"

    # Patient checkup parameters
    PatientCheckupSearchParam:
      $ref: "./parameters/patient_checkup.yaml#/PatientCheckupSearchParam"
    PatientCheckupPatientIdParam:
      $ref: "./parameters/patient_checkup.yaml#/PatientCheckupPatientIdParam"
    PatientCheckupStatusParam:
      $ref: "./parameters/patient_checkup.yaml#/PatientCheckupStatusParam"
    PatientCheckupVisitDateParam:
      $ref: "./parameters/patient_checkup.yaml#/PatientCheckupVisitDateParam"
    PatientCheckupDateFromParam:
      $ref: "./parameters/patient_checkup.yaml#/PatientCheckupDateFromParam"
    PatientCheckupDateToParam:
      $ref: "./parameters/patient_checkup.yaml#/PatientCheckupDateToParam"

    # Medicine parameters
    MedicineSearchParam:
      $ref: "./parameters/medicine.yaml#/MedicineSearchParam"
    MedicineStatusParam:
      $ref: "./parameters/medicine.yaml#/MedicineStatusParam"
    MedicineDosageFormParam:
      $ref: "./parameters/medicine.yaml#/MedicineDosageFormParam"
    PrescriptionRequiredParam:
      $ref: "./parameters/medicine.yaml#/PrescriptionRequiredParam"
    MedicineStockActivitySourceParam:
      $ref: "./parameters/medicine.yaml#/MedicineStockActivitySourceParam"

    # Medicine batch parameters
    MedicineIdParam:
      $ref: "./parameters/medicine_batch.yaml#/MedicineIdParam"
    MedicineBatchSearchParam:
      $ref: "./parameters/medicine_batch.yaml#/MedicineBatchSearchParam"
    BatchStatusParam:
      $ref: "./parameters/medicine_batch.yaml#/BatchStatusParam"
    ExpiredParam:
      $ref: "./parameters/medicine_batch.yaml#/ExpiredParam"
    ExpirationDateFromParam:
      $ref: "./parameters/medicine_batch.yaml#/ExpirationDateFromParam"
    ExpirationDateToParam:
      $ref: "./parameters/medicine_batch.yaml#/ExpirationDateToParam"

  responses:
    BadRequest:
      $ref: "./components/responses.yaml#/BadRequest"
    Unauthorized:
      $ref: "./components/responses.yaml#/Unauthorized"
    NotFound:
      $ref: "./components/responses.yaml#/NotFound"
    Forbidden:
      $ref: "./components/responses.yaml#/Forbidden"
    Conflict:
      $ref: "./components/responses.yaml#/Conflict"
    InternalServerError:
      $ref: "./components/responses.yaml#/InternalServerError"

  schemas:
    Error:
      $ref: "./schemas/common.yaml#/Error"
    Meta:
      $ref: "./schemas/common.yaml#/Meta"
    PaginationParams:
      $ref: "./schemas/common.yaml#/PaginationParams"

    # Auth
    RegisterRequest:
      $ref: "./schemas/auth.yaml#/RegisterRequest"
    LoginRequest:
      $ref: "./schemas/auth.yaml#/LoginRequest"
    AuthResponse:
      $ref: "./schemas/auth.yaml#/AuthResponse"
    UserData:
      $ref: "./schemas/auth.yaml#/UserData"
    MeResponse:
      $ref: "./schemas/auth.yaml#/MeResponse"

    # User
    User:
      $ref: "./schemas/user.yaml#/User"
    CreateUserRequest:
      $ref: "./schemas/user.yaml#/CreateUserRequest"
    UpdateUserRequest:
      $ref: "./schemas/user.yaml#/UpdateUserRequest"

    # Patient
    Patient:
      $ref: "./schemas/patient.yaml#/Patient"
    CreatePatientRequest:
      $ref: "./schemas/patient.yaml#/CreatePatientRequest"
    UpdatePatientRequest:
      $ref: "./schemas/patient.yaml#/UpdatePatientRequest"

    # Patient Checkup
    PatientCheckup:
      $ref: "./schemas/patient_checkup.yaml#/PatientCheckup"
    PatientCheckupMedicine:
      $ref: "./schemas/patient_checkup.yaml#/PatientCheckupMedicine"
    CreatePatientCheckupRequest:
      $ref: "./schemas/patient_checkup.yaml#/CreatePatientCheckupRequest"
    UpdatePatientCheckupRequest:
      $ref: "./schemas/patient_checkup.yaml#/UpdatePatientCheckupRequest"

    # Medicine
    Medicine:
      $ref: "./schemas/medicine.yaml#/Medicine"
    CreateMedicineRequest:
      $ref: "./schemas/medicine.yaml#/CreateMedicineRequest"
    UpdateMedicineRequest:
      $ref: "./schemas/medicine.yaml#/UpdateMedicineRequest"
    MedicineStockActivity:
      $ref: "./schemas/medicine.yaml#/MedicineStockActivity"

    # Medicine Batch
    MedicineBatch:
      $ref: "./schemas/medicine_batch.yaml#/MedicineBatch"
    CreateMedicineBatchRequest:
      $ref: "./schemas/medicine_batch.yaml#/CreateMedicineBatchRequest"
    UpdateMedicineBatchRequest:
      $ref: "./schemas/medicine_batch.yaml#/UpdateMedicineBatchRequest"

  securitySchemes:
    BearerAuth:
      $ref: "./components/security.yaml#/BearerAuth"
    ApiKeyAuth:
      $ref: "./components/security.yaml#/ApiKeyAuth"
