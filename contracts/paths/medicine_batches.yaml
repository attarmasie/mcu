medicine_batches:
  get:
    operationId: listMedicineBatches
    summary: Get medicine batches
    description: Retrieve a paginated list of medicine batches
    tags:
      - medicine_batches
    security:
      - BearerAuth: [admin, doctor]
    parameters:
      - $ref: "../parameters/common.yaml#/PageParam"
      - $ref: "../parameters/common.yaml#/PerPageParam"
      - $ref: "../parameters/medicine_batch.yaml#/MedicineIdParam"
      - $ref: "../parameters/medicine_batch.yaml#/MedicineBatchSearchParam"
      - $ref: "../parameters/medicine_batch.yaml#/ExpiredParam"
      - $ref: "../parameters/medicine_batch.yaml#/BatchStatusParam"
      - $ref: "../parameters/medicine_batch.yaml#/ExpirationDateFromParam"
      - $ref: "../parameters/medicine_batch.yaml#/ExpirationDateToParam"
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: "../schemas/medicine_batch.yaml#/MedicineBatch"
                meta:
                  $ref: "../schemas/common.yaml#/Meta"
      "400":
        $ref: "../components/responses.yaml#/BadRequest"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"

  post:
    operationId: createMedicineBatch
    summary: Create medicine batch
    description: Create a new medicine batch
    tags:
      - medicine_batches
    security:
      - BearerAuth: [admin, doctor]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/medicine_batch.yaml#/CreateMedicineBatchRequest"
    responses:
      "201":
        description: Medicine batch created
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: "../schemas/medicine_batch.yaml#/MedicineBatch"
      "400":
        $ref: "../components/responses.yaml#/BadRequest"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"

medicine_batches_by_id:
  get:
    operationId: getMedicineBatch
    summary: Get medicine batch by ID
    description: Retrieve a specific medicine batch by UUID
    tags:
      - medicine_batches
    security:
      - BearerAuth: [admin, doctor]
    parameters:
      - $ref: "../parameters/common.yaml#/IdParam"
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: "../schemas/medicine_batch.yaml#/MedicineBatch"
      "404":
        $ref: "../components/responses.yaml#/NotFound"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"

  put:
    operationId: updateMedicineBatch
    summary: Update medicine batch
    description: Update an existing medicine batch
    tags:
      - medicine_batches
    security:
      - BearerAuth: [admin, doctor]
    parameters:
      - $ref: "../parameters/common.yaml#/IdParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/medicine_batch.yaml#/UpdateMedicineBatchRequest"
    responses:
      "200":
        description: Medicine batch updated
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: "../schemas/medicine_batch.yaml#/MedicineBatch"
      "404":
        $ref: "../components/responses.yaml#/NotFound"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"

  delete:
    operationId: deleteMedicineBatch
    summary: Delete medicine batch
    description: Delete a medicine batch
    tags:
      - medicine_batches
    security:
      - BearerAuth: [admin, doctor]
    parameters:
      - $ref: "../parameters/common.yaml#/IdParam"
    responses:
      "204":
        description: Medicine batch deleted
      "404":
        $ref: "../components/responses.yaml#/NotFound"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
