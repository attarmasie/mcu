medicines:
  get:
    operationId: listMedicines
    summary: Get all medicines
    description: Retrieve a paginated list of medicines
    tags:
      - medicines
    security:
      - BearerAuth: [admin, doctor]
    parameters:
      - $ref: "../parameters/common.yaml#/PageParam"
      - $ref: "../parameters/common.yaml#/PerPageParam"
      - $ref: "../parameters/medicine.yaml#/MedicineSearchParam"
      - $ref: "../parameters/medicine.yaml#/MedicineStatusParam"
      - $ref: "../parameters/medicine.yaml#/MedicineDosageFormParam"
      - $ref: "../parameters/medicine.yaml#/PrescriptionRequiredParam"
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: "../schemas/medicine.yaml#/Medicine"
                meta:
                  $ref: "../schemas/common.yaml#/Meta"
      "400":
        $ref: "../components/responses.yaml#/BadRequest"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"

  post:
    operationId: createMedicine
    summary: Create new medicine
    description: Create a new medicine
    tags:
      - medicines
    security:
      - BearerAuth: [admin, doctor]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/medicine.yaml#/CreateMedicineRequest"
    responses:
      "201":
        description: Medicine created
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: "../schemas/medicine.yaml#/Medicine"
      "400":
        $ref: "../components/responses.yaml#/BadRequest"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"

medicines_by_id:
  get:
    operationId: getMedicine
    summary: Get medicine by ID
    description: Retrieve a specific medicine by UUID
    tags:
      - medicines
    security:
      - BearerAuth: [admin, doctor]
    parameters:
      - $ref: "../parameters/common.yaml#/IdParam"
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: "../schemas/medicine.yaml#/Medicine"
      "404":
        $ref: "../components/responses.yaml#/NotFound"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"

  put:
    operationId: updateMedicine
    summary: Update medicine
    description: Update an existing medicine
    tags:
      - medicines
    security:
      - BearerAuth: [admin, doctor]
    parameters:
      - $ref: "../parameters/common.yaml#/IdParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/medicine.yaml#/UpdateMedicineRequest"
    responses:
      "200":
        description: Medicine updated
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: "../schemas/medicine.yaml#/Medicine"
      "404":
        $ref: "../components/responses.yaml#/NotFound"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"

  delete:
    operationId: deleteMedicine
    summary: Delete medicine
    description: Delete a medicine
    tags:
      - medicines
    security:
      - BearerAuth: [admin, doctor]
    parameters:
      - $ref: "../parameters/common.yaml#/IdParam"
    responses:
      "204":
        description: Medicine deleted
      "404":
        $ref: "../components/responses.yaml#/NotFound"
      "401":
        $ref: "../components/responses.yaml#/Unauthorized"
