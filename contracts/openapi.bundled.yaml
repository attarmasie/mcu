  '/patient-checkups/{id}':
    get:
      operationId: getPatientCheckup
      summary: Get patient checkup by ID
      description: Retrieve a specific patient checkup by UUID
      tags:
        - patient_checkups
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PatientCheckup'
        '401':
