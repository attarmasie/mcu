openapi: 3.0.3
info:
  title: Backend API
  description: RESTful API with authentication
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
servers:
  - url: 'http://localhost:8080/api/v1'
    description: Development server
  - url: 'https://api.example.com/v1'
    description: Production server
tags:
  - name: auth
    description: Authentication endpoints
  - name: users
    description: User management
  - name: patients
    description: Patient management
  - name: medicines
    description: Medicine master data management
  - name: medicine_batches
    description: Medicine batch and inventory management
paths:
  /auth/register:
    post:
      operationId: register
      summary: Register new user
      description: Create a new user account with email and password
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: John Doe
              email: john@example.com
              password: password123
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                user:
                  id: 123e4567-e89b-12d3-a456-426614174000
                  name: John Doe
                  email: john@example.com
                  role: admin
                  is_active: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/login:
    post:
      operationId: login
      summary: Login user
      description: Authenticate user and return JWT token
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: john@example.com
              password: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                user:
                  id: 123e4567-e89b-12d3-a456-426614174000
                  name: John Doe
                  email: john@example.com
                  role: admin
                  is_active: true
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/me:
    get:
      operationId: getCurrentUser
      summary: Get current user
      description: Get current authenticated user information
      tags:
        - auth
      security:
        - BearerAuth:
            - doctor
            - admin
            - operator
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
              example:
                user_id: 123e4567-e89b-12d3-a456-426614174000
                email: john@example.com
                role: admin
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users:
    get:
      operationId: listUsers
      summary: Get all users
      description: Retrieve a paginated list of users
      tags:
        - users
      security:
        - BearerAuth:
            - admin
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createUser
      summary: Create new user
      description: Create a new user (admin only)
      tags:
        - users
      security:
        - BearerAuth:
            - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/users/{id}':
    get:
      operationId: getUser
      summary: Get user by ID
      description: Retrieve a specific user by UUID
      tags:
        - users
      security:
        - BearerAuth:
            - admin
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateUser
      summary: Update user
      description: Update an existing user
      tags:
        - users
      security:
        - BearerAuth:
            - admin
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteUser
      summary: Delete user
      description: Delete a user
      tags:
        - users
      security:
        - BearerAuth:
            - admin
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: User deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /patients:
    get:
      operationId: listPatients
      summary: Get all patients
      description: Retrieve a paginated list of patients
      tags:
        - patients
      security:
        - BearerAuth:
            - admin
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/PatientGenderParam'
        - $ref: '#/components/parameters/PatientTypeParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Patient'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createPatient
      summary: Create new patient
      description: Create a new patient
      tags:
        - patients
      security:
        - BearerAuth:
            - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientRequest'
      responses:
        '201':
          description: Patient created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Patient'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/patients/{id}':
    get:
      operationId: getPatient
      summary: Get patient by ID
      description: Retrieve a specific patient by UUID
      tags:
        - patients
      security:
        - BearerAuth:
            - admin
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Patient'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updatePatient
      summary: Update patient
      description: Update an existing patient
      tags:
        - patients
      security:
        - BearerAuth:
            - admin
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientRequest'
      responses:
        '200':
          description: Patient updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Patient'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deletePatient
      summary: Delete patient
      description: Delete a patient
      tags:
        - patients
      security:
        - BearerAuth:
            - admin
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Patient deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /medicines:
    get:
      operationId: listMedicines
      summary: Get all medicines
      description: Retrieve a paginated list of medicines
      tags:
        - medicines
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - $ref: '#/components/parameters/MedicineSearchParam'
        - $ref: '#/components/parameters/MedicineStatusParam'
        - $ref: '#/components/parameters/MedicineDosageFormParam'
        - $ref: '#/components/parameters/PrescriptionRequiredParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Medicine'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createMedicine
      summary: Create new medicine
      description: Create a new medicine
      tags:
        - medicines
      security:
        - BearerAuth:
            - admin
            - doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMedicineRequest'
      responses:
        '201':
          description: Medicine created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Medicine'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/medicines/{id}':
    get:
      operationId: getMedicine
      summary: Get medicine by ID
      description: Retrieve a specific medicine by UUID
      tags:
        - medicines
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Medicine'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateMedicine
      summary: Update medicine
      description: Update an existing medicine
      tags:
        - medicines
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMedicineRequest'
      responses:
        '200':
          description: Medicine updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Medicine'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteMedicine
      summary: Delete medicine
      description: Delete a medicine
      tags:
        - medicines
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Medicine deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /medicine-batches:
    get:
      operationId: listMedicineBatches
      summary: Get medicine batches
      description: Retrieve a paginated list of medicine batches
      tags:
        - medicine_batches
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - $ref: '#/components/parameters/MedicineIdParam'
        - $ref: '#/components/parameters/MedicineBatchSearchParam'
        - $ref: '#/components/parameters/ExpiredParam'
        - $ref: '#/components/parameters/BatchStatusParam'
        - $ref: '#/components/parameters/ExpirationDateFromParam'
        - $ref: '#/components/parameters/ExpirationDateToParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MedicineBatch'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createMedicineBatch
      summary: Create medicine batch
      description: Create a new medicine batch
      tags:
        - medicine_batches
      security:
        - BearerAuth:
            - admin
            - doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMedicineBatchRequest'
      responses:
        '201':
          description: Medicine batch created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MedicineBatch'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/medicine-batches/{id}':
    get:
      operationId: getMedicineBatch
      summary: Get medicine batch by ID
      description: Retrieve a specific medicine batch by UUID
      tags:
        - medicine_batches
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MedicineBatch'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateMedicineBatch
      summary: Update medicine batch
      description: Update an existing medicine batch
      tags:
        - medicine_batches
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMedicineBatchRequest'
      responses:
        '200':
          description: Medicine batch updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MedicineBatch'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteMedicineBatch
      summary: Delete medicine batch
      description: Delete a medicine batch
      tags:
        - medicine_batches
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Medicine batch deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number
    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: Items per page
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID
      example: 123e4567-e89b-12d3-a456-426614174000
    SearchParam:
      name: search
      in: query
      schema:
        type: string
      description: Search query
    PatientGenderParam:
      name: gender
      in: query
      schema:
        type: string
        enum:
          - male
          - female
          - other
      description: Filter by gender
    PatientTypeParam:
      name: patient_type
      in: query
      schema:
        type: string
        enum:
          - teacher
          - student
          - general
      description: Filter by patient type
    MedicineSearchParam:
      name: search
      in: query
      schema:
        type: string
      description: |
        Search medicines by name, code, or strength (partial match, case-insensitive)
    MedicineStatusParam:
      name: status
      in: query
      schema:
        type: string
        enum:
          - active
          - inactive
      description: Filter medicines by status
    MedicineDosageFormParam:
      name: dosage_form
      in: query
      schema:
        type: string
        enum:
          - tablet
          - capsule
          - syrup
          - injection
          - cream
      description: Filter medicines by dosage form
    PrescriptionRequiredParam:
      name: is_prescription_required
      in: query
      schema:
        type: boolean
      description: Filter medicines that require prescription
    MedicineIdParam:
      name: medicine_id
      in: query
      schema:
        type: string
        format: uuid
      description: Filter batches by medicine UUID
    MedicineBatchSearchParam:
      name: search
      in: query
      schema:
        type: string
      description: |
        Search medicine batches by batch number (partial match, case-insensitive)
    BatchStatusParam:
      name: status
      in: query
      schema:
        type: string
        enum:
          - active
          - inactive
      description: Filter medicine batches by status
    ExpiredParam:
      name: is_expired
      in: query
      schema:
        type: boolean
      description: |
        Filter expired batches. true = expired batches only, false = non-expired batches only
    ExpirationDateFromParam:
      name: expiration_date_from
      in: query
      schema:
        type: string
        format: date
      description: Filter batches with expiration date from (>=)
    ExpirationDateToParam:
      name: expiration_date_to
      in: query
      schema:
        type: string
        format: date
      description: Filter batches with expiration date to (<=)
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Invalid input
            code: BAD_REQUEST
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Authentication required
            code: UNAUTHORIZED
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Resource not found
            code: NOT_FOUND
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Access denied
            code: FORBIDDEN
    Conflict:
      description: Conflict - Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Email already registered
            code: CONFLICT
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Internal server error
            code: INTERNAL_ERROR
  schemas:
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Invalid input
        code:
          type: string
          example: INVALID_INPUT
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    Meta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 10
        total:
          type: integer
          example: 100
        total_pages:
          type: integer
          example: 10
    PaginationParams:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          default: 1
        per_page:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          example: John Doe
          description: Full name of the user
        email:
          type: string
          format: email
          example: john@example.com
          description: Valid email address
        password:
          type: string
          format: password
          minLength: 6
          example: password123
          description: Password (minimum 6 characters)
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: john@example.com
          description: User email address
        password:
          type: string
          format: password
          example: password123
          description: User password
    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          description: JWT authentication token
        user:
          $ref: '#/components/schemas/UserData'
    UserData:
      type: object
      required:
        - id
        - name
        - email
        - role
        - is_active
      properties:
        id:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
          description: User UUID
        name:
          type: string
          example: John Doe
          description: User's full name
        email:
          type: string
          format: email
          example: john@example.com
          description: User's email address
        role:
          type: string
          enum:
            - admin
            - doctor
            - operator
          example: admin
          description: User role
        is_active:
          type: boolean
          example: true
          description: Whether the user account is active
    MeResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
          description: Current user UUID
        email:
          type: string
          format: email
          example: john@example.com
          description: Current user email
        role:
          type: string
          example: admin
          description: Current user role
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
          description: User UUID
        name:
          type: string
          example: John Doe
          minLength: 2
          maxLength: 100
          description: User's full name
        email:
          type: string
          format: email
          example: john@example.com
          description: User's email address
        role:
          type: string
          enum:
            - admin
            - doctor
            - operator
          default: doctor
          description: User role
        is_active:
          type: boolean
          default: true
          description: Whether the user is active
        created_at:
          type: string
          format: date-time
          description: User creation timestamp
        updated_at:
          type: string
          format: date-time
          description: User last update timestamp
    CreateUserRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: John Doe
