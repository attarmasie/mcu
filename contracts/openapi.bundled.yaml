openapi: 3.0.3
info:
  title: Backend API
  description: RESTful API with authentication
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
servers:
  - url: 'http://localhost:8080/api/v1'
    description: Development server
  - url: 'https://api.example.com/v1'
    description: Production server
tags:
  - name: auth
    description: Authentication endpoints
  - name: users
    description: User management
  - name: patients
    description: Patient management
  - name: patient_checkups
    description: Patient checkup history management
  - name: medicines
    description: Medicine master data management
  - name: medicine_batches
    description: Medicine batch and inventory management
paths:
  /auth/register:
    post:
      operationId: register
      summary: Register new user
      description: Create a new user account with email and password
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: John Doe
              email: john@example.com
              password: password123
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                user:
                  id: 123e4567-e89b-12d3-a456-426614174000
                  name: John Doe
                  email: john@example.com
                  role: admin
                  is_active: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/login:
    post:
      operationId: login
      summary: Login user
      description: Authenticate user and return JWT token
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: john@example.com
              password: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                user:
                  id: 123e4567-e89b-12d3-a456-426614174000
                  name: John Doe
                  email: john@example.com
                  role: admin
                  is_active: true
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/me:
    get:
      operationId: getCurrentUser
      summary: Get current user
      description: Get current authenticated user information
      tags:
        - auth
      security:
        - BearerAuth:
            - doctor
            - admin
            - operator
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
              example:
                user_id: 123e4567-e89b-12d3-a456-426614174000
                email: john@example.com
                role: admin
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users:
    get:
      operationId: listUsers
      summary: Get all users
      description: Retrieve a paginated list of users
      tags:
        - users
      security:
        - BearerAuth:
            - admin
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createUser
      summary: Create new user
      description: Create a new user (admin only)
      tags:
        - users
      security:
        - BearerAuth:
            - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/users/{id}':
    get:
      operationId: getUser
      summary: Get user by ID
      description: Retrieve a specific user by UUID
      tags:
        - users
      security:
        - BearerAuth:
            - admin
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateUser
      summary: Update user
      description: Update an existing user
      tags:
        - users
      security:
        - BearerAuth:
            - admin
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteUser
      summary: Delete user
      description: Delete a user
      tags:
        - users
      security:
        - BearerAuth:
            - admin
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: User deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /patients:
    get:
      operationId: listPatients
      summary: Get all patients
      description: Retrieve a paginated list of patients
      tags:
        - patients
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/PatientGenderParam'
        - $ref: '#/components/parameters/PatientTypeParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Patient'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createPatient
      summary: Create new patient
      description: Create a new patient
      tags:
        - patients
      security:
        - BearerAuth:
            - admin
            - doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientRequest'
      responses:
        '201':
          description: Patient created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Patient'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/patients/{id}':
    get:
      operationId: getPatient
      summary: Get patient by ID
      description: Retrieve a specific patient by UUID
      tags:
        - patients
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Patient'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updatePatient
      summary: Update patient
      description: Update an existing patient
      tags:
        - patients
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePatientRequest'
      responses:
        '200':
          description: Patient updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Patient'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deletePatient
      summary: Delete patient
      description: Delete a patient
      tags:
        - patients
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Patient deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /patient-checkups:
    get:
      operationId: listPatientCheckups
      summary: Get patient checkup history
      description: Retrieve a paginated list of patient checkups
      tags:
        - patient_checkups
      security:
        - BearerAuth:
            - admin
            - doctor
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - $ref: '#/components/parameters/PatientCheckupSearchParam'
        - $ref: '#/components/parameters/PatientCheckupPatientIdParam'
        - $ref: '#/components/parameters/PatientCheckupStatusParam'
        - $ref: '#/components/parameters/PatientCheckupVisitDateParam'
        - $ref: '#/components/parameters/PatientCheckupDateFromParam'
        - $ref: '#/components/parameters/PatientCheckupDateToParam'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PatientCheckup'
                  meta:
                    $ref: '#/components/schemas/Meta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createPatientCheckup
      summary: Create patient visit schedule
      description: Admin creates patient visit schedule with initial symptoms
      tags:
        - patient_checkups
      security:
        - BearerAuth:
            - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientCheckupRequest'
      responses:
        '201':
          description: Patient checkup created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PatientCheckup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
