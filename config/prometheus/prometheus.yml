global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/alerts.yml

scrape_configs:
  - job_name: "mcu-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8080"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "http_requests_total|http_request_duration_seconds_(bucket|sum|count)|app_build_info|go_goroutines|go_memstats_heap_alloc_bytes|go_memstats_heap_inuse_bytes|process_resident_memory_bytes|process_cpu_seconds_total"
        action: keep

  - job_name: "alloy"
    static_configs:
      - targets: ["alloy:12345"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "otelcol_exporter_sent_spans|otelcol_exporter_send_failed_spans|otelcol_receiver_accepted_spans|otelcol_receiver_refused_spans"
        action: keep

  - job_name: "redis"
    scrape_interval: 30s
    static_configs:
      - targets: ["redis-exporter:9121"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "redis_up|redis_connected_clients|redis_memory_used_bytes|redis_memory_max_bytes|redis_commands_processed_total|redis_net_input_bytes_total|redis_net_output_bytes_total|redis_keyspace_hits_total|redis_keyspace_misses_total|redis_evicted_keys_total|redis_expired_keys_total"
        action: keep

  - job_name: "postgres"
    scrape_interval: 30s
    static_configs:
      - targets: ["postgres-exporter:9187"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "pg_up|pg_stat_database_numbackends|pg_stat_database_xact_commit|pg_stat_database_xact_rollback|pg_stat_database_blks_read|pg_stat_database_blks_hit|pg_database_size_bytes|pg_locks_count|pg_stat_activity_count"
        action: keep
